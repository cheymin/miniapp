name: Build For A6P & Upload AMR

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

env:
  TOOLCHAIN_URL: https://github.com/penosext/Cloudpan/releases/download/toolchains/armv7-eabihf--uclibc--bleeding-edge-2018.11-1.tar.bz2
  VERSIONINFO_URL: https://github.com/penosext/Cloudpan/releases/download/PenA6Pro/A6PversionInfo.tar.gz
  DEVICE: a6p

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: ''

      - name: Install dependencies & toolchain
        run: |
          npm install -g pnpm@latest-10
          pnpm install --verbose -C ./ui
          mkdir -p ./jsapi/toolchains
          wget -q ${{ env.TOOLCHAIN_URL }} -O ./jsapi/toolchains/armv7-eabihf--uclibc--bleeding-edge-2018.11-1.tar.bz2
          tar -xjf ./jsapi/toolchains/armv7-eabihf--uclibc--bleeding-edge-2018.11-1.tar.bz2 -C ./jsapi/toolchains
          wget -q ${{ env.VERSIONINFO_URL }}
          tar -xf A6PversionInfo.tar.gz -C ./jsapi

      - name: Build
        run: |
          sed -i "s/const DEVICE_MODEL = 'a6p'/const DEVICE_MODEL = '$DEVICE'/" ./ui/src/pages/update/update.ts
          cd ./ui
          sed -i "s/commonjs(),/commonjs(),require('@rollup\/plugin-typescript')(),/g" ./node_modules/aiot-vue-cli/src/libs/rollup.config.js
          sed -i "s/compiler.parseComponent(content, { pad: 'line' })/compiler.parse(content, { pad: 'line' }).descriptor/g" ./node_modules/aiot-vue-cli/web-loaders/falcon-vue-loader/lib/parser.js
          sed -i "s/path.resolve(__dirname, '.\/vue\/packages\/vue-template-compiler\/index.js')/'@vue\/compiler-sfc'/g" ./node_modules/aiot-vue-cli/cli-libs/index.js
          sed -i "s/compiler.parseComponent(content, { pad: true })/compiler.parse(content, { pad: true }).descriptor/g" ./node_modules/aiot-vue-cli/src/libs/parser.js
          sed -i "s/compiler.compile/compiler.compileTemplate/g" ./node_modules/aiot-vue-cli/web-loaders/falcon-vue-loader/lib/template-compiler/index.js
          sed -i "s/const replaceValues = {}/const replaceValues = { 'defineComponent': '' }/g" ./node_modules/aiot-vue-cli/src/libs/rollup.config.js
          # Fix: resolve relative image paths in image plugin (use importer as base)
          sed -i "s/resolveId(id, importer) {/resolveId(id, importer) {\n      if (id.startsWith('.') \&\& importer) { id = require('path').resolve(require('path').dirname(importer), id); }/g" ./node_modules/aiot-vue-cli/src/rollup-plugins/image.js
          cd ..
          sed -i '/project(/a\set(CMAKE_DEPEND_INFO_SKIP 1)\nset(CMAKE_LINK_DEPENDS_USE_LINKER 0)' ./jsapi/CMakeLists.txt
          chmod +x ./tools/build.sh
          ./tools/build.sh -a

      - name: Get version
        id: version
        run: |
          VERSION=$(grep '"version"' ./ui/package.json | head -1 | sed 's/.*"version": *"\([^"]*\)".*/\1/')
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Version: ${VERSION}"

      - name: Collect AMR files
        run: |
          VERSION=$(grep '"version"' ./ui/package.json | head -1 | sed 's/.*"version": *"\([^"]*\)".*/\1/')
          find . -type f -iname '*.amr' > amr_files.txt || true
          echo "Found $(wc -l < amr_files.txt) .amr files"
          cat amr_files.txt
          mkdir -p release_files
          for f in ./ui/*.amr; do
            if [ -f "$f" ]; then
              cp "$f" "release_files/miniapp_a6p_v${VERSION}.amr"
            fi
          done
          ls -la release_files/

      - name: Upload AMR artifacts
        uses: actions/upload-artifact@v4
        with:
          name: amr-files
          path: './ui/*.amr'
          if-no-files-found: ignore
          retention-days: 30

      - name: Create Release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: Release v${{ steps.version.outputs.version }}
          body: |
            ## min的工具箱 v${{ steps.version.outputs.version }}
            
            ### 更新内容
            - 新增桌面界面：时钟、日历、快捷消息、应用抽屉、通知中心
            - 新增QQ聊天功能：基础聊天、表情转换
            - 更新源改为 cheymin/miniapp
            
            ### 下载
            下载下方的 `.amr` 文件安装
            
          files: ./release_files/*.amr
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
